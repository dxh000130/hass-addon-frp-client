name: "FRP Client"
description: "You can use this tool to achieve remote access to local Home Assistant OS by port forwarding"
version: "1.0.12"
slug: "frp_client"
host_network: true
startup: application
boot: "auto"
init: false
map:
  - "share:rw"
privileged:
  - NET_ADMIN
devices:
  - /dev/net/tun
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  serverAddr: "example.com"
  serverPort: 7000
  authToken: "123456789"
  webServerPort: 7500
  webServerUser: "admin"
  webServerPassword: "123456789"
  subdomain: "example.com"
  proxyName: "homeassistant"
  sshproxyName: "homeassistantssh"
  localPort: 24
  remotePort: 6001
  enableHypanel: false
  hypanelHttps: false      # true = https, false = http
  hypanelName: "hypanel"
  hypanelIP: "1.1.1.1"
  hypanelPort: 80
  enableTcp9000: false
  tcp9000Name: "tcp9000"
  tcp9000LocalIP: "127.0.0.1"
  tcp9000LocalPort: 8123
schema:
  serverAddr: str
  serverPort: int
  authToken: str
  webServerPort: int
  webServerUser: str
  webServerPassword: str
  subdomain: str
  proxyName: str
  sshproxyName: str
  localPort: int
  remotePort: int
  enableHypanel: bool
  hypanelHttps: bool
  hypanelName: str
  hypanelIP: str
  hypanelPort: int
  enableTcp9000: bool
  tcp9000Name: str
  tcp9000LocalIP: str
  tcp9000LocalPort: int